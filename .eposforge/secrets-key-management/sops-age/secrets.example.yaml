# secrets.example.yaml — template for the sops-age adapter vault.
#
# This is the committed reference for adopters. The REAL vault lives in
# secrets.enc.yaml, which is gitignored and must never be committed to this
# framework repo — each adopter keeps its own encrypted vault in its own repo.
#
# To create a real vault from this template:
#   1. cp secrets.example.yaml secrets.plaintext.yaml   (gitignored)
#   2. fill in real values
#   3. set your age recipients in .sops.yaml
#   4. sops --encrypt secrets.plaintext.yaml > secrets.enc.yaml
#   5. rm secrets.plaintext.yaml
#
# Keys map to manifest entries in secrets.toml (logical_name -> vault key).
# Entries with a `vault_key` in the manifest reuse one of these values under a
# different runtime_name; do not add a separate key for them here.

anthropic_api_key: sk-ant-REPLACE_ME
openai_api_key: sk-proj-REPLACE_ME
neo4j_password: REPLACE_ME
github_pat_operator_dev: github_pat_REPLACE_ME
gemini_api_key: AIzaREPLACE_ME            # optional — only if using Gemini CLI
azure_api_key: REPLACE_ME                 # Azure AI Foundry inference key
cognee_api_url: https://cognee.example.internal:PORT   # sensitivity: internal
cognee_tls_verify: "false"                # sensitivity: public
