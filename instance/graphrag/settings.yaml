### GraphRAG 3.x project configuration for EposForge
### Required env vars (set in .env): ANTHROPIC_API_KEY, OPENAI_API_KEY

### LLM settings ###
completion_models:
  default_completion_model:
    model_provider: anthropic
    model: claude-sonnet-4-6
    auth_method: api_key
    api_key: ${ANTHROPIC_API_KEY}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: text-embedding-3-small
    auth_method: api_key
    api_key: ${OPENAI_API_KEY}
    retry:
      type: exponential_backoff

### Document processing settings ###
input:
  type: text
  file_pattern: "[/\\\\](00-vision|01-architecture|02-roadmap|03-research)[/\\\\].*\\.md$$"

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: cl100k_base

### Storage settings ###
input_storage:
  type: file
  base_dir: "../"

output_storage:
  type: file
  base_dir: "./output"

reporting:
  type: file
  base_dir: "./output/reports"

cache:
  type: json
  storage:
    type: file
    base_dir: "./cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb

### Workflow settings ###
embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/entity_extraction.txt"
  entity_types:
    - component
    - adapter
    - phase
    - pillar
    - principle
    - factory
    - deliverable
    - constraint
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_reports.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings ###
local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
