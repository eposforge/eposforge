schema_version = "1"

[manifest]
adapter               = "sops-age"
encrypted_file        = "secrets.enc.yaml"
sops_config           = ".sops.yaml"
age_key_path_linux    = "~/.config/sops/age/keys.txt"
age_key_path_windows  = "%APPDATA%/sops/age/keys.txt"
age_key_source_of_truth = "operator-password-vault:eposforge/age-private-key"

[[secret]]
logical_name          = "anthropic_api_key"
runtime_name          = "ANTHROPIC_API_KEY"
source_of_truth       = "secrets.enc.yaml#anthropic_api_key"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/spec-graph/graphrag/scripts/rebuild.sh",
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
  "instance/tool-transport/mcp-stdio-and-http/scripts/cognee-mcp-win-wrapper.py",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask sk-ant-* prefix in tracebacks"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "openai_api_key"
runtime_name          = "OPENAI_API_KEY"
source_of_truth       = "secrets.enc.yaml#openai_api_key"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/spec-graph/graphrag/scripts/rebuild.sh",
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
  "instance/tool-transport/mcp-stdio-and-http/scripts/cognee-mcp-win-wrapper.py",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask sk-proj-* prefix in tracebacks"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "neo4j_password"
runtime_name          = "NEO4J_PASSWORD"
source_of_truth       = "secrets.enc.yaml#neo4j_password"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/spec-graph/graphrag/scripts/rebuild.sh",
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
  "instance/tool-transport/mcp-stdio-and-http/scripts/cognee-mcp-win-wrapper.py",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask in all log output"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "github_pat_operator_dev"
runtime_name          = "GITHUB_PERSONAL_ACCESS_TOKEN"
source_of_truth       = "secrets.enc.yaml#github_pat_operator_dev"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask ghp_* and github_pat_* prefixes in tracebacks"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "gemini_api_key"
runtime_name          = "GEMINI_API_KEY"
source_of_truth       = "secrets.enc.yaml#gemini_api_key"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/dev-product/gemini-cli/",
]
required_environments = []  # optional — only needed if using Gemini CLI
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask AIza* prefix in tracebacks"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "azure_api_key"
runtime_name          = "AZURE_API_KEY"
source_of_truth       = "secrets.enc.yaml#azure_api_key"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
  "instance/inference/scripts/validate-azure-routing-config.sh",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask in all log output"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "cognee_api_url"
runtime_name          = "COGNEE_API_URL"
source_of_truth       = "secrets.enc.yaml#cognee_api_url"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/spec-graph/cognee/sync/",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "do not commit hostname in plaintext per AGENTS.md"]
fallback              = "manual export from operator password vault"

[[secret]]
logical_name          = "cognee_tls_verify"
runtime_name          = "COGNEE_TLS_VERIFY"
source_of_truth       = "secrets.enc.yaml#cognee_tls_verify"
injection_path        = "process-env via epos-secrets shim"
consumers             = [
  "instance/spec-graph/cognee/sync/",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["not sensitive — value is 'false' or a CA cert path"]
fallback              = "set COGNEE_TLS_VERIFY=false in the shell manually"
