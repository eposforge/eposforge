schema_version = "1"

[manifest]
adapter = "env-vars"

[[secret]]
logical_name          = "epos_env"
runtime_name          = "EPOS_ENV"
source_of_truth       = "process environment (default: dev)"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/secrets-key-management/bin/epos-secrets",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "defaults to 'dev' if unset"

[[secret]]
logical_name          = "llm_model"
runtime_name          = "LLM_MODEL"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "each consumer has a hardcoded default"

[[secret]]
logical_name          = "embedding_model"
runtime_name          = "EMBEDDING_MODEL"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "each consumer has a hardcoded default"

[[secret]]
logical_name          = "inference_provider"
runtime_name          = "INFERENCE_PROVIDER"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
  "instance/spec-graph/cognee/sync/",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "defaults to 'azure-foundry' in launcher script"

[[secret]]
logical_name          = "cognee_require_azure_routing"
runtime_name          = "COGNEE_REQUIRE_AZURE_ROUTING"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
  "instance/spec-graph/cognee/sync/",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "defaults to '1' in launcher script"

[[secret]]
logical_name          = "azure_api_base"
runtime_name          = "AZURE_API_BASE"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "must be set by operator or host stack"

[[secret]]
logical_name          = "azure_api_version"
runtime_name          = "AZURE_API_VERSION"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "defaults to 2024-10-01 in launcher script"
