schema_version = "1"

[manifest]
adapter           = "windows-credential-manager"
scope             = "gemini-runner sandbox user only"
bootstrap_script  = "instance/installed/07-execution-sandbox/windows-acl-user/scripts/install-gemini-sandbox.ps1"

# These secrets are seeded by install-gemini-sandbox.ps1 into the gemini-runner
# user's Windows Credential Manager store. The epos-secrets resolver validates
# their presence (when running as gemini-runner) but does not inject them into
# the operator's process env.

[[secret]]
logical_name          = "gemini_api_key_sandbox"
runtime_name          = "GEMINI_API_KEY"
source_of_truth       = "Windows Credential Manager target: eposforge/gemini-runner/gemini-api-key"
injection_path        = "Windows Credential Manager -> gemini-runner user env at process launch"
consumers             = [
  "gemini-runner: Gemini CLI (instance/installed/03-dev-product/gemini-cli/)",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask AIza* prefix in tracebacks"]
fallback              = "re-run install-gemini-sandbox.ps1 with new key"

[[secret]]
logical_name          = "github_pat_sandbox"
runtime_name          = "GITHUB_PERSONAL_ACCESS_TOKEN"
source_of_truth       = "Windows Credential Manager target: eposforge/gemini-runner/github-pat"
injection_path        = "Windows Credential Manager -> gemini-runner user env at process launch"
consumers             = [
  "gemini-runner: Gemini CLI (instance/installed/03-dev-product/gemini-cli/)",
]
required_environments = ["dev"]
rotation_owner        = "operator"
redaction_rules       = ["never log raw value", "mask ghp_* and github_pat_* prefixes in tracebacks"]
fallback              = "re-run install-gemini-sandbox.ps1 with new PAT"
