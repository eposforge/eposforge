schema_version = "1"

[manifest]
adapter = "env-vars"

[[secret]]
logical_name          = "epos_env"
runtime_name          = "EPOS_ENV"
source_of_truth       = "process environment (default: dev)"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/installed/12-secrets-key-management/bin/epos-secrets",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "defaults to 'dev' if unset"

[[secret]]
logical_name          = "llm_model"
runtime_name          = "LLM_MODEL"
source_of_truth       = "process environment"
injection_path        = "process-env passthrough"
consumers             = [
  "instance/installed/05-tool-transport/mcp-stdio-and-http/scripts/run-eposforge-mcp-http.ps1",
]
required_environments = []
rotation_owner        = "n/a"
redaction_rules       = ["no redaction required — not sensitive"]
fallback              = "each consumer has a hardcoded default"
