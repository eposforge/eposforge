name: DCO Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco-check:
    name: DCO Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather PR commits
        id: get_pr_commits
        uses: tim-actions/get-pr-commits@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Signed-off-by on every commit
        uses: tim-actions/dco@master
        with:
          commits: ${{ steps.get_pr_commits.outputs.commits }}
